<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Number-Hands Clock + 12 Tick Marks</title>
  <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
  <style>
    :root{
      --size:420px;
      --bg:#0f172a;
      --face-start:#1e293b;
      --face-end:#0f172a;
      --tick-color: rgba(203,213,225,0.9);
    }

    html,body{
      height:100%;
      margin:0;
      background:var(--bg);
      font-family: "Segoe UI", Roboto, system-ui, -apple-system, sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    #clock{
      position:relative;
      width:var(--size);
      height:var(--size);
      border-radius:50%;
      background: radial-gradient(circle, var(--face-start), var(--face-end));
      box-shadow: 0 8px 30px rgba(2,6,23,0.8), inset 0 2px 8px rgba(255,255,255,0.02);
      border: 8px solid rgba(52,65,85,0.9);
      overflow:visible;
      user-select:none;
    }

    .center-dot{
      position:absolute;
      left:50%;
      top:50%;
      width:16px;
      height:16px;
      transform:translate(-50%,-50%);
      background:linear-gradient(180deg,#ffffff,#cbd5e1);
      border-radius:50%;
      box-shadow:0 0 12px rgba(255,255,255,0.9), 0 4px 12px rgba(2,6,23,0.6);
      z-index:40;
      pointer-events:none;
    }

    .hand{
      position:absolute;
      left:50%;
      top:50%;
      transform-origin: 50% 100%;
      display:flex;
      flex-direction: column-reverse;
      align-items:center;
      pointer-events:none;
      transition: transform 0.25s cubic-bezier(.2,.9,.3,1);
      transform: translate(-50%,-100%) rotate(0deg);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    .hour-line   { height:120px; font-size:18px; color:#fbbf24; text-shadow:0 0 8px rgba(251,191,36,0.6); z-index:30; }
    .minute-line { height:160px; font-size:16px; color:#38bdf8; text-shadow:0 0 8px rgba(56,189,248,0.6); z-index:25; }
    .second-line { height:190px; font-size:14px; color:#ef4444; text-shadow:0 0 8px rgba(239,68,68,0.6); z-index:20; }

    .digit{
      display:block;
      padding:4px 8px;
      margin-bottom:6px;
      border-radius:8px;
      font-weight:700;
      letter-spacing:0.6px;
      background:rgba(255,255,255,0.02);
      backdrop-filter: blur(2px);
      box-shadow: 0 1px 0 rgba(255,255,255,0.02), 0 2px 8px rgba(2,6,23,0.6);
      transform-origin:center center;
      white-space:nowrap;
      pointer-events:none;
    }

    .date-window{
      position:absolute;
      top:50%;
      right:18%;
      transform:translateY(-50%);
      width:48px;
      height:32px;
      background:#111827;
      border-radius:6px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:700;
      font-size:15px;
      color:#e5e7eb;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.6), 0 2px 6px rgba(0,0,0,0.4);
      border:1px solid rgba(255,255,255,0.1);
      pointer-events:none;
      z-index:0;
    }

    .digital-time{
      position:absolute;
      left:50%;
      bottom:70px;
      transform:translateX(-50%);
      color:#e6eef8;
      font-weight:600;
      letter-spacing:2px;
      font-size:20px;
      text-shadow:0 0 8px rgba(0,0,0,0.6);
      pointer-events:none;
      z-index:0;
    }

    .tick{
      position:absolute;
      left:50%;
      top:50%;
      width:40px;
      height:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
    }

    .tick .mark{
      display:block;
      width:4px;
      height:22px;
      border-radius:3px;
      background:var(--tick-color);
      box-shadow: 0 0 6px rgba(255,255,255,0.03);
    }

    @media (max-width:450px){
      :root{ --size:320px; }
    }
  </style>
</head>
<body>
  <div id="clock" aria-label="Analog-digital clock">
    <div class="center-dot"></div>
    <div class="date-window" id="dateWindow"></div>
    <div class="hand hour-line"   id="hourLine"></div>
    <div class="hand minute-line" id="minuteLine"></div>
    <div class="hand second-line" id="secondLine"></div>
    <div id="ticks"></div>
    <div class="digital-time" id="digitalTime">00:00:00</div>
  </div>

  <script>
    // ── Init: ticks ───────────────────────────────────────────────
    (function createTicks() {
      const $clock  = $("#clock");
      const radius  = Math.round(Math.min($clock.width(), $clock.height()) / 2 - 36);
      for (let i = 1; i <= 12; i++) {
        $('<div class="tick"><span class="mark"></span></div>')
          .css("transform", `translate(-50%,-50%) rotate(${i * 30}deg) translateY(-${radius}px)`)
          .appendTo($clock);
      }
    })();

    // ── Init: measure digit height once (it never changes) ───────
    const digitHeight = (() => {
      const $probe = $('<div class="digit" style="visibility:hidden;position:absolute;left:-9999px">00</div>').appendTo("body");
      const h = $probe.outerHeight(true) || 20;
      $probe.remove();
      return h;
    })();

    // ── Init: cache jQuery references ────────────────────────────
    const hands = [
      { $el: $("#hourLine"),   getValue: t => t.getHours(),   getAngle: (H,M,S) => (H % 12) * 30 + M * 0.5, cumAngle: null },
      { $el: $("#minuteLine"), getValue: t => t.getMinutes(), getAngle: (H,M,S) => M * 6 + S * 0.1,         cumAngle: null },
      { $el: $("#secondLine"), getValue: t => t.getSeconds(), getAngle: (H,M,S) => S * 6,                   cumAngle: null },
    ];

    // ── Cumulative angle — prevents CSS transition wrap-around ───
    function accumulate(raw, prev) {
      if (prev === null) return raw;
      let delta = raw - (prev % 360);
      if (delta > 180) delta -= 360;
      if (delta < 0)   delta += 360;
      return prev + delta;
    }

    // ── Fill hand only if value changed ──────────────────────────
    function fillHand($hand, value) {
      const padded = String(value).padStart(2, "0");
      if ($hand.data("lastValue") === padded) return; // skip if unchanged
      $hand.data("lastValue", padded);

      const count = Math.max(1, Math.floor(($hand.height() || 100) / (digitHeight + 2)));
      $hand.html(`<div class="digit">${padded}</div>`.repeat(count));
    }

    // ── Main update ───────────────────────────────────────────────
    function updateClock() {
      const now = new Date();
      const [H, M, S] = [now.getHours(), now.getMinutes(), now.getSeconds()];
      const pad = n => String(n).padStart(2, "0");

      for (const hand of hands) {
        const raw   = hand.getAngle(H, M, S);
        const angle = accumulate(raw, hand.cumAngle);
        hand.cumAngle = angle;

        fillHand(hand.$el, hand.getValue(now));
        hand.$el.css("transform", `translate(-50%,-100%) rotate(${angle}deg)`);
        hand.$el.find(".digit").css("transform", `rotate(${-angle}deg)`);
      }

      $("#digitalTime").text(`${pad(H)}:${pad(M)}:${pad(S)}`);
      $("#dateWindow").text(now.getDate());
    }

    setInterval(updateClock, 1000);
    updateClock();
  </script>
</body>
</html>
