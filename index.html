<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Number-Hands Clock + 12 Tick Marks</title>
  <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
  <style>
    :root{
      --size:420px;
      --bg:#0f172a;
      --face-start:#1e293b;
      --face-end:#0f172a;
      --tick-color: rgba(203,213,225,0.9);
    }

    html,body{
      height:100%;
      margin:0;
      background:var(--bg);
      font-family: "Segoe UI", Roboto, system-ui, -apple-system, sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    #clock{
      position:relative;
      width:var(--size);
      height:var(--size);
      border-radius:50%;
      background: radial-gradient(circle, var(--face-start), var(--face-end));
      box-shadow: 0 8px 30px rgba(2,6,23,0.8), inset 0 2px 8px rgba(255,255,255,0.02);
      border: 8px solid rgba(52,65,85,0.9);
      overflow:visible;
      user-select:none;
    }

    /* center dot */
    .center-dot{
      position:absolute;
      left:50%;
      top:50%;
      width:16px;
      height:16px;
      transform:translate(-50%,-50%);
      background:linear-gradient(180deg,#ffffff,#cbd5e1);
      border-radius:50%;
      box-shadow:0 0 12px rgba(255,255,255,0.9), 0 4px 12px rgba(2,6,23,0.6);
      z-index:40;
      pointer-events:none;
    }

    /* generic hand container that is positioned so its bottom sits exactly at the center */
    .hand{
      position:absolute;
      left:50%;
      top:50%;
      /* bottom (pivot) will be placed at center using translate(-50%,-100%) below */
      transform-origin: 50% 100%;
      display:flex;
      flex-direction: column-reverse; /* stack from center outward */
      align-items:center;
      pointer-events:none;
      transition: transform 0.25s cubic-bezier(.2,.9,.3,1);
      /* ensure it's placed so its bottom equals the center */
      transform: translate(-50%,-100%) rotate(0deg);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    /* heights define how long the hand extends from center */
    .hour-line { height:120px; font-size:18px; color:#fbbf24; text-shadow:0 0 8px rgba(251,191,36,0.6); z-index:30; }
    .minute-line { height:160px; font-size:16px; color:#38bdf8; text-shadow:0 0 8px rgba(56,189,248,0.6); z-index:25; }
    .second-line { height:190px; font-size:14px; color:#ef4444; text-shadow:0 0 8px rgba(239,68,68,0.6); z-index:20; }

    /* each repeating digit "chip" */
    .digit{
      display:block;
      padding:4px 8px;
      margin-bottom:6px;            /* spacing outward from center */
      border-radius:8px;
      font-weight:700;
      letter-spacing:0.6px;
      background:rgba(255,255,255,0.02);
      backdrop-filter: blur(2px);
      box-shadow: 0 1px 0 rgba(255,255,255,0.02), 0 2px 8px rgba(2,6,23,0.6);
      transform-origin:center center; /* used when we counter-rotate digits */
      white-space:nowrap;
      pointer-events:none;
    }

    /* digital time readout */
    .digital-time{
      position:absolute;
      left:50%;
      bottom:70px;
      transform:translateX(-50%);
      color:#e6eef8;
      font-weight:600;
      letter-spacing:2px;
      font-size:20px;
      text-shadow:0 0 8px rgba(0,0,0,0.6);
      /* z-index:50; */
      pointer-events:none;
    }

    /* tick mark container: we place it around the clock via JS transforms */
    .tick{
      position:absolute;
      left:50%;
      top:50%;
      width:40px;
      height:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
    }

    /* the small mark - NOW TALL AND THIN */
    .tick .mark{
      display:block;
      width:4px;
      height:22px;
      border-radius:3px;
      background:var(--tick-color);
      box-shadow: 0 0 6px rgba(255,255,255,0.03);
      transform-origin:center center;
    }

    /* make everything crisp on small screens */
    @media (max-width:450px){
      :root{ --size:320px; }
    }
  </style>
</head>
<body>
  <div id="clock" aria-label="Analog-digital clock">
    <div class="center-dot"></div>

    <!-- hands (empty — JS fills digits inside) -->
    <div class="hand hour-line" id="hourLine"></div>
    <div class="hand second-line" id="secondLine"></div>
    <div class="hand minute-line" id="minuteLine"></div>

    <!-- tick marks (JS will add 12 of them) -->
    <div id="ticks"></div>

    <div class="digital-time" id="digitalTime">00:00:00</div>
  </div>

  <script>
    // create the 12 ticks (single run)
    (function createTicks(){
      const $clock = $("#clock");
      const size = $clock.width(); // uses CSS var size
      // radius: distance from center to where tick should be placed
      const radius = Math.round(Math.min($clock.width(), $clock.height())/2 - 36); // keep inside border
      for(let i=1;i<=12;i++){
        const angle = i * 30; // degrees
        const $t = $('<div class="tick"><span class="mark"></span></div>');
        // place tick: move element from center outward by radius after rotating
        $t.css("transform", `translate(-50%,-50%) rotate(${angle}deg) translateY(-${radius}px)`);
        
        // No counter-rotation is needed here, the mark inherits its parent's rotation.
        
        $clock.append($t);
      }
    })();

    // fill hand with repeated number chips sized to the hand height
    function fillHand($hand, value){
      $hand.empty();
      // create a probe to measure chip height (uses hand's font-size)
      const $probe = $('<div class="digit" style="visibility:hidden;position:absolute;left:-9999px">00</div>').appendTo("body"); 
      const digitH = $probe.outerHeight(true) || 20;
      $probe.remove();

      const handH = $hand.height() || 100;
      // how many chips fit (reserve a little top space)
      const count = Math.max(1, Math.floor(handH / (digitH + 2)));
      const padded = value.toString().padStart(2, "0");
      for(let i=0;i<count;i++){
        $hand.append(`<div class="digit">${padded}</div>`);
      }
    }

    // Track cumulative angles to avoid CSS transition wrap-around
    const prev = { hourAngle: null, minuteAngle: null, secondAngle: null };

    function normalizeCumulative(newRaw, prevCumulative) {
      if (prevCumulative === null) return newRaw;
      // Find the smallest forward delta, never go backwards
      let delta = newRaw - (prevCumulative % 360);
      if (delta > 180) delta -= 360;
      if (delta < -180) delta += 360;
      // If delta is negative (would animate backwards), add 360 to go forward instead
      if (delta < 0) delta += 360;
      return prevCumulative + delta;
    }

    function updateClock(){
      const now = new Date();
      const hours = now.getHours();
      const minutes = now.getMinutes();
      const seconds = now.getSeconds();

      // raw angles (0–360)
      const rawHour   = (hours % 12) * 30 + minutes * 0.5;
      const rawMinute = minutes * 6 + seconds * 0.1;
      const rawSecond = seconds * 6;

      // cumulative angles — always move forward, never snap backwards
      const hourAngle   = normalizeCumulative(rawHour,   prev.hourAngle);
      const minuteAngle = normalizeCumulative(rawMinute, prev.minuteAngle);
      const secondAngle = normalizeCumulative(rawSecond, prev.secondAngle);

      prev.hourAngle   = hourAngle;
      prev.minuteAngle = minuteAngle;
      prev.secondAngle = secondAngle;

      const $hour = $("#hourLine"), $minute = $("#minuteLine"), $second = $("#secondLine");

      // fill (smart count based on available height)
      fillHand($hour, hours);
      fillHand($minute, minutes);
      fillHand($second, seconds);

      // rotate the whole hand — important: keep translate(-50%,-100%) to anchor bottom at center
      $hour.css("transform", `translate(-50%,-100%) rotate(${hourAngle}deg)`);
      $minute.css("transform", `translate(-50%,-100%) rotate(${minuteAngle}deg)`);
      $second.css("transform", `translate(-50%,-100%) rotate(${secondAngle}deg)`);

      // counter-rotate digits so they stay upright
      $hour.find(".digit").css("transform", `rotate(${-hourAngle}deg)`);
      $minute.find(".digit").css("transform", `rotate(${-minuteAngle}deg)`);
      $second.find(".digit").css("transform", `rotate(${-secondAngle}deg)`);

      // digital readout
      const pad = n => n.toString().padStart(2,"0");
      $("#digitalTime").text(`${pad(hours)}:${pad(minutes)}:${pad(seconds)}`);
    }

    // tick every second
    setInterval(updateClock, 1000);
    updateClock();
  </script>
</body>
</html>
